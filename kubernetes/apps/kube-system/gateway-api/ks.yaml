---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gateway-api
  namespace: flux-system
spec:
  targetNamespace: kube-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./config/crd/standard
  prune: false # CRDs should never be auto-pruned
  sourceRef:
    kind: GitRepository
    name: gateway-api
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
