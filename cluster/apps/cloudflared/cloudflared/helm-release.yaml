---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  interval: 15m
  chart:
    spec:
      chart: cloudflared
      version: 1.0.1
      sourceRef:
        kind: HelmRepository
        name: kubitodev
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    image:
      repository: cloudflare/cloudflared
      tag: "2022.10.3"
    tunnelID: ${CLOUDFLARE_TUNNEL_ID}
    existingSecret: cloudflare-tunnel-secret
    ingress:
      - hostname: "flux-receiver.${SECRET_DOMAIN}"
        service: https://webhook-receiver.flux-system:80
      - service: http_status:404
