apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: plex
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      # registryUrl=https://k8s-at-home.com/charts/
      chart: plex
      version: 6.4.3
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/k8s-at-home/plex
      tag: v1.29.2.6364-6d72b0cf6
      pullPolicy: IfNotPreset
    env:
      TZ: America/Chicago
    securityContext:
      runAsUser: 568
    persistence:
      config:
        enabled: true
        existingClaim: local-config
      transcode:
        enabled: true
        type: hostPath
        hostPath: /mnt/tv
    nodeSelector:
      kubernetes.io/arch: amd64
