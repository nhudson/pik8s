apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: plex
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      # registryUrl=https://k8s-at-home.com/charts/
      chart: plex
      version: 6.4.3
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
  values:
    image:
      repository: plexinc/pms-docker
      tag: 1.29.2.6364-6d72b0cf6
      pullPolicy: IfNotPresent
    env:
      TZ: America/Chicago
      VERSION: latest
      PGID: "\x35\x36\x38"
      PUID: "\x35\x36\x38"
      PLEX_GID: "\x35\x36\x38"
      PLEX_UID: "\x35\x36\x38"
      CHANGE_CONFIG_DIR_OWNERSHIP: false
      ALLOWED_NETWORKS: 192.168.6.0/24,192.168.86.0/24
      NVIDIA_DRIVER_CAPABILITIES: all
    securityContext:
      runAsUser: 568
    persistence:
      config:
        enabled: true
        existingClaim: local-config
      data:
        enabled: true
        type: hostPath
        hostPath: /mnt
      transcode:
        enabled: true
        type: hostPath
        hostPath: /mnt/transcode
    nodeSelector:
      kubernetes.io/arch: amd64
    hostNetwork: true
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        cpu: 2
        memory: 3000mi
