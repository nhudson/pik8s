---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-nzbget
  namespace: media
spec:
  capacity:
    storage: 8Ti
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/tv
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - thrawn
