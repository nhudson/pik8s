apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nzbget
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      # registryUrl=https://k8s-at-home.com/charts/
      chart: nzbget
      version: 12.4.2
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/k8s-at-home/nzbget
      tag: v21.1
      pullPolicy: Always
    persistence:
      config:
        enabled: true
        existingClaim: local-config
      media:
        enabled: true
        type: pvc
        existingClaim: media-nzbget
        mountPath: /media
    nodeSelector:
      kubernetes.io/arch: amd64
