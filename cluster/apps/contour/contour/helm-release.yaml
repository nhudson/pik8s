---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: contour
  namespace: contour
spec:
  interval: 15m
  chart:
    spec:
      chart: contour
      version: 10.0.0
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    global:
      configInline:
        disablePermitInsecure: false
        tls:
          minimum-protocol-version: "1.3"
          fallback-certificate: {}
        accesslog-format: envoy
    ingress:
      enabled: true
